openapi: 3.1.0
info:
  title: FinancePerso API
  description: |
    API REST complète pour la gestion financière personnelle.
    
    ## Fonctionnalités
    
    - **Authentification** : JWT avec refresh tokens
    - **Transactions** : CRUD, import CSV, catégorisation automatique
    - **Comptes** : Gestion multi-comptes bancaires
    - **Budgets** : Suivi budgétaire par catégorie
    - **Analytics** : Prédictions, tendances, détection d'anomalies
    - **Export** : CSV, JSON, rapports PDF
    - **Notifications** : Temps réel via WebSocket
    
    ## Authentification
    
    L'API utilise JWT (JSON Web Tokens) pour l'authentification.
    
    1. Obtenez un token via `POST /auth/login`
    2. Incluez le token dans l'en-tête : `Authorization: Bearer <token>`
    3. Rafraîchissez le token via `POST /auth/refresh`
    
  version: 1.0.0
  contact:
    name: FinancePerso Support
    email: support@financeperso.app

servers:
  - url: http://localhost:8000/api
    description: Serveur de développement
  - url: https://api.financeperso.app/api
    description: Serveur de production

tags:
  - name: Authentication
    description: Authentification JWT
  - name: Accounts
    description: Comptes bancaires
  - name: Transactions
    description: Transactions et opérations
  - name: Dashboard
    description: Statistiques et KPIs
  - name: Analytics
    description: Analytics avancés
  - name: Health
    description: Health check

paths:
  /auth/login:
    post:
      tags: [Authentication]
      summary: Connexion
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Connexion réussie

  /accounts:
    get:
      tags: [Accounts]
      summary: Liste des comptes
      security: [bearerAuth: []]
      responses:
        '200':
          description: Liste des comptes

  /transactions:
    get:
      tags: [Transactions]
      summary: Liste des transactions
      security: [bearerAuth: []]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Transactions paginées

  /dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Statistiques
      security: [bearerAuth: []]
      responses:
        '200':
          description: KPIs

  /analytics/anomalies:
    get:
      tags: [Analytics]
      summary: Détection d'anomalies
      security: [bearerAuth: []]
      responses:
        '200':
          description: Anomalies détectées

  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: API opérationnelle

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

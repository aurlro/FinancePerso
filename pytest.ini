# Pytest configuration
[pytest]
testpaths = tests
norecursedirs = .git .pytest_cache *.egg Data .env .DS_Store .claude .venv .*
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --ignore=.claude --ignore=.pytest_cache --ignore=.venv --ignore=tests/.coverage
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

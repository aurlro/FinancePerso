[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.pytest_cache
  | __pycache__
  | Data
  | docs
)/
'''

[tool.ruff]
line-length = 150  # TODO: Gradually reduce to 100 (see docs/CODE_QUALITY_ROADMAP.md)
target-version = "py312"
exclude = [
    ".git",
    "__pycache__",
    "Data",
    "docs",
    "modules/notifications_legacy.py",  # Legacy file with many issues
]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "I",  # isort
    "N",  # pep8-naming
    "UP", # pyupgrade
]
ignore = [
    "N818",  # Exception name suffix - allow CircuitBreakerOpen style names
    "N806",  # Variable names in function - allow TRANSFER_KEYWORDS style
    "E402",  # Module level import not at top - needed for some patterns
    "E741",  # Ambiguous variable name - allow 'l' in list comprehensions
    "UP046", # Generic class type parameters - backward compatibility
    "F811",  # Redefinition of unused - common in __init__.py files
    "F821",  # Undefined name - TODO: fix these
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=modules --cov-report=html --cov-report=term-missing -v"
norecursedirs = [".git", ".pytest_cache", "*.egg", "Data", ".DS_Store"]

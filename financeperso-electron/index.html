<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinancePerso</title>
    <meta name="description" content="Gestion financière de couple" />
    <!-- 
      CSP for Electron + Vite dev server:
      - default-src 'self': Only allow resources from same origin
      - script-src 'self' 'unsafe-inline' 'unsafe-eval': Allow inline scripts and eval for Vite HMR
      - style-src 'self' 'unsafe-inline': Allow inline styles
      - connect-src: Allow API calls to localhost and 127.0.0.1 for dev server
      - img-src 'self' data:: Allow images from same origin and data URIs
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:5173 ws://127.0.0.1:5173 http://localhost:5173 http://127.0.0.1:5173; img-src 'self' data:;">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer.tsx"></script>
  </body>
</html>

name: Cleanup Branches and PRs

on:
  schedule:
    # Exécution quotidienne à minuit UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Mode simulation (sans suppression réelle)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    name: 🧹 Cleanup Branches and PRs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup merged branches
        id: cleanup_branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const dryRun = ${{ github.event.inputs.dry_run || false }};
            
            console.log(`🔍 Scanning branches in ${owner}/${repo}...`);
            if (dryRun) {
              console.log('⚠️ DRY RUN MODE - No actual deletions will occur');
            }
            
            // Get default branch (main or master)
            const { data: repoInfo } = await github.rest.repos.get({
              owner,
              repo
            });
            const defaultBranch = repoInfo.default_branch;
            console.log(`📌 Default branch: ${defaultBranch}`);
            
            // List all branches
            const branches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );
            
            let deletedCount = 0;
            let skippedCount = 0;
            const protectedPatterns = [
              defaultBranch,
              'develop',
              'staging',
              'release/*',
              'hotfix/*'
            ];
            
            for (const branch of branches) {
              const branchName = branch.name;
              
              // Skip protected branches
              if (protectedPatterns.some(pattern => {
                if (pattern.includes('*')) {
                  const regex = new RegExp('^' + pattern.replace('*', '.*') + '$');
                  return regex.test(branchName);
                }
                return pattern === branchName;
              })) {
                console.log(`⏭️ Skipping protected branch: ${branchName}`);
                skippedCount++;
                continue;
              }
              
              // Check if branch is merged
              try {
                const { data: comparison } = await github.rest.repos.compareCommits({
                  owner,
                  repo,
                  base: defaultBranch,
                  head: branchName
                });
                
                // If branch is behind or equal (merged)
                if (comparison.behind_by > 0 || comparison.status === 'identical') {
                  // Check for dependabot branches
                  if (branchName.startsWith('dependabot/')) {
                    console.log(`🗑️ Deleting merged dependabot branch: ${branchName}`);
                    if (!dryRun) {
                      await github.rest.git.deleteRef({
                        owner,
                        repo,
                        ref: `heads/${branchName}`
                      });
                    }
                    deletedCount++;
                    continue;
                  }
                  
                  // Check for Design branch (if merged)
                  if (branchName === 'Design') {
                    console.log(`🗑️ Deleting merged Design branch: ${branchName}`);
                    if (!dryRun) {
                      await github.rest.git.deleteRef({
                        owner,
                        repo,
                        ref: `heads/${branchName}`
                      });
                    }
                    deletedCount++;
                    continue;
                  }
                  
                  // Other feature branches that are merged
                  if (branchName.startsWith('feature/') || branchName.startsWith('fix/') || branchName.startsWith('refactor/')) {
                    console.log(`🗑️ Deleting merged feature branch: ${branchName}`);
                    if (!dryRun) {
                      await github.rest.git.deleteRef({
                        owner,
                        repo,
                        ref: `heads/${branchName}`
                      });
                    }
                    deletedCount++;
                  }
                }
              } catch (error) {
                console.log(`❌ Error checking branch ${branchName}: ${error.message}`);
              }
            }
            
            console.log(`\n📊 Summary:`);
            console.log(`   - Branches deleted: ${deletedCount}`);
            console.log(`   - Branches skipped (protected): ${skippedCount}`);
            
            return { deleted: deletedCount, skipped: skippedCount };

      - name: Close stale dependabot PRs
        id: cleanup_prs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const dryRun = ${{ github.event.inputs.dry_run || false }};
            
            console.log(`🔍 Scanning open PRs in ${owner}/${repo}...`);
            
            // List open PRs from dependabot
            const pulls = await github.paginate(
              github.rest.pulls.list,
              { 
                owner, 
                repo, 
                state: 'open',
                per_page: 100 
              }
            );
            
            const dependabotPRs = pulls.filter(pr => 
              pr.user.login === 'dependabot[bot]' || 
              pr.head.ref.startsWith('dependabot/')
            );
            
            console.log(`📦 Found ${dependabotPRs.length} open dependabot PRs`);
            
            let closedCount = 0;
            const staleDate = new Date();
            staleDate.setDate(staleDate.getDate() - 30); // 30 days old
            
            for (const pr of dependabotPRs) {
              const prDate = new Date(pr.created_at);
              
              // Close if stale (older than 30 days) or has conflicts
              if (prDate < staleDate || pr.mergeable === false) {
                console.log(`🔒 Closing stale/conflict PR #${pr.number}: ${pr.title}`);
                
                if (!dryRun) {
                  // Close the PR
                  await github.rest.pulls.update({
                    owner,
                    repo,
                    pull_number: pr.number,
                    state: 'closed'
                  });
                  
                  // Add comment explaining why
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: `🤖 **Auto-closed by cleanup workflow**\n\nThis PR was automatically closed because:\n- ${prDate < staleDate ? 'It is older than 30 days' : 'It has merge conflicts'}\n\nA new PR will be created if the update is still needed.`
                  });
                }
                closedCount++;
              } else {
                console.log(`✅ Keeping active PR #${pr.number}: ${pr.title}`);
              }
            }
            
            console.log(`\n📊 PR Summary:`);
            console.log(`   - PRs closed: ${closedCount}`);
            console.log(`   - PRs kept: ${dependabotPRs.length - closedCount}`);
            
            return { closed: closedCount, kept: dependabotPRs.length - closedCount };

      - name: Summary
        if: always()
        run: |
          echo "## 🧹 Cleanup Summary"
          echo ""
          echo "| Operation | Status |"
          echo "|-----------|--------|"
          echo "| Branch Cleanup | ${{ steps.cleanup_branches.outcome == 'success' && '✅' || '❌' }} |"
          echo "| PR Cleanup | ${{ steps.cleanup_prs.outcome == 'success' && '✅' || '❌' }} |"

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Permissions minimales requises
permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  # =============================================================================
  # PHASE 1: Lint & Format (Fail Fast)
  # =============================================================================
  lint:
    name: 🎨 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.6 black==25.1.0

      - name: Check formatting with Black
        run: |
          black --check --diff modules/ pages/ tests/

      - name: Lint with Ruff
        run: |
          ruff check modules/ pages/ tests/ --output-format=github

      - name: Check import sorting with Ruff
        run: |
          ruff check modules/ pages/ tests/ --select I --output-format=github

  # =============================================================================
  # PHASE 2: Tests
  # =============================================================================
  test:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with pytest
        run: |
          pytest tests/ \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_update_manager.py \
            --ignore=tests/e2e/ \
            --tb=short \
            -v \
            --cov=modules \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            coverage.xml
            .coverage
          retention-days: 7

  # =============================================================================
  # PHASE 3: Security Audit
  # =============================================================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          bandit -r modules/ -f json -o bandit-report.json || true
          bandit -r modules/ -f screen

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

      - name: Check for known security vulnerabilities
        run: |
          safety check -r requirements.txt --json --output safety-report.json || true
          safety check -r requirements.txt || true

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-vulnerability-report
          path: safety-report.json
          retention-days: 30

  # =============================================================================
  # PHASE 4: Build & Verify
  # =============================================================================
  build:
    name: 🏗️ Build & Verify
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "import app; print('✅ Application imports successful')"

      - name: Verify application starts
        run: |
          timeout 15s streamlit run app.py &
          sleep 8
          curl -f http://localhost:8501/_stcore/health || exit 1
          echo "✅ Application health check passed"

      - name: Build Docker image
        run: |
          docker build -t financeperso:ci-test .
          echo "✅ Docker build successful"

  # =============================================================================
  # PHASE 5: Summary
  # =============================================================================
  notify:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: CI Success
        if: needs.lint.result == 'success' && needs.test.result == 'success' && needs.security.result == 'success' && needs.build.result == 'success'
        run: |
          echo "✅ All CI checks passed!"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Test: ${{ needs.test.result }}"
          echo "- Security: ${{ needs.security.result }}"
          echo "- Build: ${{ needs.build.result }}"

      - name: CI Failure
        if: needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.security.result == 'failure' || needs.build.result == 'failure'
        run: |
          echo "❌ Some CI checks failed!"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Test: ${{ needs.test.result }}"
          echo "- Security: ${{ needs.security.result }}"
          echo "- Build: ${{ needs.build.result }}"
          exit 1

      - name: Comment PR with summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const lint = '${{ needs.lint.result }}';
            const test = '${{ needs.test.result }}';
            const security = '${{ needs.security.result }}';
            const build = '${{ needs.build.result }}';
            
            const status = (result) => result === 'success' ? '✅' : result === 'failure' ? '❌' : '⏭️';
            
            const body = `## 🔍 CI/CD Summary
            
            | Job | Status |
            |-----|--------|
            | ${status(lint)} Lint & Format | ${lint} |
            | ${status(test)} Tests | ${test} |
            | ${status(security)} Security Audit | ${security} |
            | ${status(build)} Build & Verify | ${build} |
            
            ${lint === 'success' && test === 'success' && security === 'success' && build === 'success' 
              ? '🎉 All checks passed! Ready to merge.' 
              : '⚠️ Some checks failed. Please review the details above.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

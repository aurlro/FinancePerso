name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ============================================
  # Backend Tests
  # ============================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black
      
      - name: Lint with flake8
        run: |
          flake8 modules/ web/api/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 modules/ web/api/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
      
      - name: Check formatting with black
        run: black --check modules/ web/api/ || true
      
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=modules --cov-report=xml --cov-report=html -x
        continue-on-error: true
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: htmlcov/
          retention-days: 7

  # ============================================
  # Frontend Build
  # ============================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: web/frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: web/frontend
        run: npm run lint
        continue-on-error: true
      
      - name: Build frontend
        working-directory: web/frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web/frontend/dist/
          retention-days: 7

  # ============================================
  # API Tests
  # ============================================
  api-test:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test]
    
    services:
      # SQLite is file-based, no service needed
      pass
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      
      - name: Start API server
        run: |
          cd web/api
          python start_api.py &
          sleep 5
          curl -s http://localhost:8000/api/health || exit 1
      
      - name: Run API tests
        run: |
          pytest tests/integration/ -v -x || true
        continue-on-error: true

  # ============================================
  # E2E Tests with Playwright
  # ============================================
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Setup Python Backend
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Setup Node Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci
      
      # Install Playwright
      - name: Install Playwright browsers
        working-directory: web/frontend
        run: |
          npm install -D @playwright/test
          npx playwright install chromium firefox webkit
      
      # Run E2E tests
      - name: Run Playwright tests
        working-directory: web/frontend
        run: npx playwright test --project=chromium
        env:
          FRONTEND_URL: http://localhost:8080
          API_URL: http://localhost:8000/api
        continue-on-error: true
      
      # Upload test results
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/frontend/playwright-report/
          retention-days: 7
      
      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: web/frontend/test-results/
          retention-days: 7

  # ============================================
  # Security Scan
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Bandit (Python security)
        run: |
          pip install bandit
          bandit -r modules/ web/api/ -f json -o bandit-report.json || true
          bandit -r modules/ web/api/ || true
      
      - name: Run npm audit (Node security)
        working-directory: web/frontend
        run: npm audit --audit-level=high || true
      
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 7

  # ============================================
  # Deploy (Production)
  # ============================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: web/frontend/dist/
      
      - name: Deploy to server
        run: |
          echo "Deploying to production..."
          # Add your deployment commands here
          # Example: rsync, docker push, etc.
      
      - name: Notify deployment
        run: |
          echo "Deployment completed!"

# =============================================================================
# Docker Compose pour FinancePerso
# =============================================================================
# Usage:
#   docker-compose up -d          # Démarrer en arrière-plan
#   docker-compose down           # Arrêter
#   docker-compose logs -f        # Voir les logs
#   docker-compose build          # Reconstruire l'image
# =============================================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=${ENVIRONMENT:-production}
    container_name: financeperso-app
    image: financeperso:latest
    
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    
    volumes:
      # Persistance de la base de données
      - ./Data:/app/Data
      # Persistance des logs
      - ./logs:/app/logs
      # Fichier de configuration (read-only)
      - ./.env:/app/.env:ro
    
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DB_PATH=${DB_PATH:-/app/Data/finance.db}
    
    # Variables depuis le fichier .env
    env_file:
      - .env
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Sécurité
    security_opt:
      - no-new-privileges:true
    
    # Limites de ressources (optionnel, décommenter pour production)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
    #     reservations:
    #       cpus: '1'
    #       memory: 512M

  # Optionnel: Service de backup automatique
  # backup:
